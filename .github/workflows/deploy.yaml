on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: deploy
        run: |
          echo "Host: ${{ secrets.SSH_HOST }}"
          mkdir ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts
          ssh mytuser@${{ secrets.SSH_HOST }} << EOF
            cd /var/www/myteacher-office
            git fetch origin main
            git reset --hard origin/main

            if [ ! -f backend/.env ] && [ -n "${{ secrets.DB_HOST }}" ]; then
              printf '%s\n' \
                'HOST=127.0.0.1' \
                'PORT=4000' \
                '' \
                'DB_HOST=${{ secrets.DB_HOST }}' \
                'DB_PORT=${{ secrets.DB_PORT }}' \
                'DB_USERNAME=${{ secrets.DB_USERNAME }}' \
                'DB_PASSWORD=${{ secrets.DB_PASSWORD }}' \
                'DB_NAME=${{ secrets.DB_NAME }}' \
                '' \
                'JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}' \
                'JWT_ACCESS_EXPIRES=15m' \
                'JWT_REFRESH_DAYS=30' \
                '' \
                'TYPEORM_SYNC=true' \
                'TYPEORM_LOGGING=false' \
                'SEED_DEMO=true' \
                > backend/.env
            fi

            cd backend
            npm ci
            npm run build

            pm2 delete myteacher-office || true
            pm2 start dist/main.js --name myteacher-office --update-env
            pm2 save
          EOF
